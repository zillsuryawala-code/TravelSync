<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Tours & Travels</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='stylelogin.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <section id="login">
        <div class="login-container">
            <h2>Welcome Back!</h2>
            <p>Login to continue exploring Gujarat with AI Tours & Travels.</p>
            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="remember-forgot">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>
                 <a href="main.html">
                <button type="submit" class="login-btn">
                    <span>Login</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </a>
            </form>
            

            <!-- Social Login -->
            <div class="social-login">
                <p>Or login with:</p>
                <button class="google-btn" id="google-login-btn">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="facebook-btn">
                    <i class="fab fa-facebook"></i> Facebook
                </button>
            </div>

            <!-- Sign Up Link -->
            <div class="signup-link">
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
            </div>
        </div>
    </section>


</body>
</html>
